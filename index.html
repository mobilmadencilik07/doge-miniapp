<!-- FRIENDS SCREEN -->

<div id="friends" class="screen">

<div class="walletBox">

<h2>👥 Invite Friends</h2>

<h1 id="refCount">
12 Referrals
</h1>

<p style="margin-top:10px;font-size:11px;opacity:.7;">
Earn +0.2 DOGE per friend
</p>

<input
id="refLink"
value="https://t.me/YOURBOT?start=ref123"
readonly
style="
margin-top:15px;
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
font-size:11px;
">

<button
class="walletBtn deposit"
onclick="copyRef()">
Copy Referral Link
</button>

<button
class="walletBtn withdraw"
onclick="fakeInvite()">
Invite Friend
</button>

</div>

</div>

<!-- WALLET SCREEN -->

<div id="wallet" class="screen">

<div class="walletBox">

<h2>💰 Wallet</h2>

<h1 id="walletBalance">
0.00000 DOGE
</h1>

<button class="walletBtn withdraw"
onclick="withdraw()">
Withdraw DOGE
</button>

<button class="walletBtn deposit"
onclick="deposit()">
Deposit DOGE
</button>

<button class="walletBtn deposit"
onclick="claimDaily()">
🎁 Daily Reward
</button>

<button class="walletBtn deposit"
onclick="boostMining()">
⚡ Boost Mining
</button>

</div>

</div>

<!-- TASKS SCREEN -->

<div id="tasks" class="screen">

<div class="walletBox">

<h2>📋 Tasks</h2>

<button
class="walletBtn deposit"
onclick="instagramTask()">
📸 Follow Instagram +0.2 DOGE
</button>

<button
class="walletBtn deposit"
onclick="telegramTask()">
📢 Join Telegram +0.2 DOGE
</button>

</div>

<div class="walletBox">

<h2>🛠 Support</h2>

<button
class="walletBtn withdraw"
onclick="supportOpen()">
@dearmadenn
</button>

</div>

</div>

<!-- NAVIGATION -->

<div class="nav">

<div class="navBtn activeNav"
onclick="openScreen('home',this)">
🏠
<br>
Home
</div>

<div class="navBtn"
onclick="openScreen('friends',this)">
👥
<br>
Friends
</div>

<div class="navBtn"
onclick="openScreen('tasks',this)">
📋
<br>
Tasks
</div>

<div class="navBtn"
onclick="openScreen('wallet',this)">
💰
<br>
Wallet
</div>

</div>

<script>

// REFERRAL SYSTEM

let referrals =
Number(localStorage.getItem("referrals")) || 12;

document.getElementById("refCount").innerHTML =
referrals + " Referrals";

function copyRef(){

let copyText =
document.getElementById("refLink");

copyText.select();

copyText.setSelectionRange(0,99999);

navigator.clipboard.writeText(
copyText.value
);

alert("Referral Link Copied");

}

function fakeInvite(){

referrals++;

balance =
Number(balance) + 0.2;

localStorage.setItem(
"referrals",
referrals
);

localStorage.setItem(
"balance",
balance
);

document.getElementById("refCount").innerHTML =
referrals + " Referrals";

updateUI();

alert("👥 New Referral Joined");

}

// WITHDRAW SYSTEM

function withdraw(){

let wallet =
prompt(
"Enter DOGE Wallet Address"
);

if(!wallet) return;

let amount =
prompt(
"Enter Withdraw Amount"
);

if(!amount) return;

window.open(
"https://t.me/dearmadenn?text=" +
encodeURIComponent(
"💸 DOGE Withdraw Request\n\nWallet Address: " +
wallet +
"\nWithdraw Amount: " +
amount +
" DOGE\n\nCurrent Balance: " +
Number(balance).toFixed(5)
),
"_blank"
);

}

// BOOST SYSTEM

function boostMining(){

alert(
"⚡ Boost Activated\n\nMining Speed +20% for 1 Hour"
);

}

// TASKS

function instagramTask(){

window.open(
"https://instagram.com/dearmaden.com.tr",
"_blank"
);

balance =
Number(balance) + 0.2;

localStorage.setItem(
"balance",
balance
);

updateUI();

alert("✅ +0.2 DOGE Added");

}

function telegramTask(){

window.open(
"https://t.me/+CfF8gfHEUjZiODk0",
"_blank"
);

balance =
Number(balance) + 0.2;

localStorage.setItem(
"balance",
balance
);

updateUI();

alert("✅ +0.2 DOGE Added");

}

// SUPPORT

function supportOpen(){

window.open(
"https://t.me/dearmadenn",
"_blank"
);

}

</script>
