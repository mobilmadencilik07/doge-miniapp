<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOGE MINER PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#081120,#0f172a);
color:white;
min-height:100vh;
overflow-x:hidden;
}

.topbar{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:700;
color:#facc15;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
background:#1e293b;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.card{
width:92%;
margin:auto;
margin-top:10px;
background:#111827;
border-radius:25px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

.balanceText{
font-size:16px;
opacity:.7;
}

.balance{
font-size:45px;
font-weight:700;
margin-top:5px;
color:#facc15;
}

.mineArea{
display:flex;
justify-content:center;
margin-top:40px;
}

.mineBtn{
width:230px;
height:230px;
border:none;
border-radius:50%;
background:linear-gradient(145deg,#facc15,#eab308);
font-size:70px;
cursor:pointer;
box-shadow:
0 0 40px rgba(250,204,21,.5),
inset 0 0 20px rgba(255,255,255,.2);
transition:.2s;
}

.mineBtn:active{
transform:scale(.95);
}

.stats{
display:flex;
justify-content:space-between;
margin-top:40px;
gap:15px;
}

.box{
flex:1;
background:#1e293b;
padding:18px;
border-radius:18px;
text-align:center;
}

.box h3{
font-size:14px;
opacity:.7;
margin-bottom:8px;
}

.box p{
font-size:22px;
font-weight:700;
}

.claimBox{
margin-top:35px;
background:#1e293b;
padding:20px;
border-radius:20px;
}

.claimBox h2{
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:16px;
}

.claimBtn{
width:100%;
margin-top:15px;
padding:15px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.result{
margin-top:15px;
text-align:center;
font-weight:600;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top:1px solid rgba(255,255,255,.1);
}

.navItem{
text-align:center;
font-size:14px;
opacity:.7;
}

.active{
color:#facc15;
opacity:1;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
🐶 DOGE PRO
</div>

<div class="profile">
D
</div>

</div>

<div class="card">

<div class="balanceText">
Total Balance
</div>

<div class="balance" id="balance">
0 DOGE
</div>

<div class="mineArea">

<button class="mineBtn" onclick="mine()">
⛏️
</button>

</div>

<div class="stats">

<div class="box">
<h3>Mining Rate</h3>
<p>+5 DOGE</p>
</div>

<div class="box">
<h3>Level</h3>
<p>1</p>
</div>

<div class="box">
<h3>Users</h3>
<p>12K</p>
</div>

</div>

<div class="claimBox">

<h2>🎁 Claim Airdrop</h2>

<input type="text" id="code" placeholder="Enter DOGE Code">

<button class="claimBtn" onclick="claimCode()">
CLAIM REWARD
</button>

<div class="result" id="result"></div>

</div>

</div>

<div class="bottomNav">

<div class="navItem active">
🏠
<br>
Home
</div>

<div class="navItem">
⛏️
<br>
Mine
</div>

<div class="navItem">
👥
<br>
Friends
</div>

<div class="navItem">
💰
<br>
Wallet
</div>

</div>

<script>

let balance =
localStorage.getItem("balance") || 0;

document.getElementById("balance").innerHTML =
balance + " DOGE";

function mine(){

balance = Number(balance) + 5;

localStorage.setItem("balance", balance);

document.getElementById("balance").innerHTML =
balance + " DOGE";

}

const codes = [
"DOGE-TMA-7X92-KLP1",
"DOGE-MINIAPP-2026-XQ",
"DOGE-BOOST-VIP-92A",
"DOGE-CLAIM-8XZ1",
"DOGE-REWARD-72PQ"
];

function claimCode(){

let code =
document.getElementById("code").value;

let usedCodes =
JSON.parse(localStorage.getItem("usedCodes")) || [];

if(usedCodes.includes(code)){

document.getElementById("result").innerHTML =
"❌ Code Already Used";

return;

}

if(codes.includes(code)){

balance = Number(balance) + 1000;

localStorage.setItem("balance", balance);

usedCodes.push(code);

localStorage.setItem(
"usedCodes",
JSON.stringify(usedCodes)
);

document.getElementById("balance").innerHTML =
balance + " DOGE";

document.getElementById("result").innerHTML =
"✅ 1000 DOGE Added";

}else{

document.getElementById("result").innerHTML =
"❌ Invalid Code";

}

}

</script>

</body>
</html>
